{% set name = "zerostack-bin" %}
{% set version = "1.6.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/gi-dellav/zerostack/releases/download/v{{ version }}/zerostack-x86_64-unknown-linux-musl.tar.gz  # [linux and x86_64]
    sha256: 854232371f44f1493c9b5f0046656a9c4f1a9376b2c7a050f5555657708d5ec3
  - url: https://github.com/gi-dellav/zerostack/releases/download/v{{ version }}/zerostack-aarch64-unknown-linux-musl.tar.gz  # [linux and aarch64]
    sha256: d23fd7e51d582773a7cae4804767c547edcc69ea04e3f545d53210811b474237
  - url: https://raw.githubusercontent.com/gi-dellav/zerostack/v{{ version }}/LICENSE
    sha256: 3972dc9744f6499f0f9b2dbf76696f2ae7ad8af9b23dde66d6af86c9dfb36986

build:
  number: 0
  binary_relocation: false

requirements:
  build: []
  host: []
  run: []

test:
  commands:
    - zerostack --help
    - zerostack --version

about:
  home: https://github.com/gi-dellav/zerostack
  license: GPL-3.0-only
  license_file: LICENSE
  summary: Minimalistic coding agent written in Rust, optimized for memory footprint and performance

extra:
  recipe-maintainers:
    - gi-dellav
